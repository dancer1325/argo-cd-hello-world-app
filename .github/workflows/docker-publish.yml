name: Build and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: version
        uses: anothrNick/github-tag-action@1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            dancer13/argo-cd-hello-world-app:${{ steps.version.outputs.new_tag }}
            dancer13/argo-cd-hello-world-app:latest

      - name: Update image tag in config repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/dancer1325/argo-cd-hello-world-config.git config-repo
          cd config-repo
          sed -i "s/tag:.*/tag: ${{ steps.version.outputs.new_tag }}/" helm/values.test.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/values.test.yaml
          git commit -m "Update image tag to ${{ steps.version.outputs.new_tag }}"
          git push
